apiVersion: tachyon.dev/v1alpha1
kind: MeshApplication
metadata:
  name: quasar-core
spec:
  components:
    - name: telemetry-bridge
      module: faas/telemetry-bridge.wasm
      route: /telemetry/ingest
    - name: timeseries-writer
      module: faas/timeseries-writer.wasm
      storage:
        engine: reddb
        path: quasar/events
    - name: replay-writer
      module: faas/replay-writer.wasm
      route: /telemetry/replay
      isolation: dedicated-pool
      compression: zstd
      storage:
        engine: reddb
        partition: replay/<session_id>
