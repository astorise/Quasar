name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── 1. Rust workspace: fmt / clippy / test ──────────────────────────────────
  rust:
    name: Rust (fmt · clippy · test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-wasip2

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Unit & integration tests
        run: cargo test --workspace

      # Build Wasm binaries and upload as CI artifacts on every run
      - name: Build Wasm FaaS components
        run: |
          cargo build --workspace --release --target wasm32-wasip2
          mkdir -p dist/wasm
          for crate in telemetry-bridge timeseries-writer olap-engine view-builder replay-writer; do
            cp target/wasm32-wasip2/release/${crate//-/_}.wasm dist/wasm/${crate}.wasm
          done

      - name: Upload Wasm artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-faas-${{ github.sha }}
          path: dist/wasm/*.wasm
          retention-days: 14

  # ── 2. Node.js workspace: install / check / e2e ────────────────────────────
  node:
    name: Node.js (check · e2e)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --workspaces --include-workspace-root

      - name: Syntax checks
        run: npm run check

      - name: E2E test suite
        run: npm run test:e2e

      # Bundle SDK and upload as CI artifact on every run
      - name: Bundle SDK
        run: |
          npx rollup -c sdk/rollup.config.mjs
          mkdir -p dist/sdk
          cp sdk/analytics-core/dist/quasar-core.mjs dist/sdk/
          cp sdk/analytics-replay/dist/quasar-replay.mjs dist/sdk/

      - name: Build UI
        run: npm --workspace quasar-ui run build
        env:
          NODE_ENV: production

      - name: Upload SDK + UI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: js-bundles-${{ github.sha }}
          path: |
            dist/sdk/*.mjs
            ui/dist/**
          retention-days: 14

  # ── 3. Release (tag-triggered): reuse CI artifacts + package vsix ──────────
  release:
    name: Release artifacts
    needs: [rust, node]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Wasm artifacts
        uses: actions/download-artifact@v4
        with:
          name: wasm-faas-${{ github.sha }}
          path: dist/wasm

      - name: Download SDK + UI artifacts
        uses: actions/download-artifact@v4
        with:
          name: js-bundles-${{ github.sha }}
          path: dist

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --workspaces --include-workspace-root

      # Package VS Code extension (uses workspace-installed vsce)
      - name: Package VS Code extension
        run: |
          cd quasar-vscode
          npx vsce package --no-dependencies --out ../dist/quasar-vscode.vsix

      # Create GitHub Release and attach all assets
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/wasm/*.wasm
            dist/sdk/*.mjs
            dist/quasar-vscode.vsix
          generate_release_notes: true
