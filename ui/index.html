<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quasar Analytics</title>
    <script type="module" src="/src/main.js"></script>
  </head>
  <body>
    <quasar-provider endpoint="/api/query">
      <main class="shell">

      </main>
    </quasar-provider>
  </body>
</html>
